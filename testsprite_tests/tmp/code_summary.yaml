version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router)
  - React 19
  - Tailwind CSS 4
  - shadcn/ui (base-nova)
  - Supabase (Auth + PostgreSQL + Storage)
  - Prisma ORM (SQLite local)
  - Puppeteer (PDF/PNG/JPG export)
  - Google Generative AI (Gemini)
  - ExcelJS (Excel reports)
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: true
    description: Dashboard with system KPIs, recent activity, quick access modules
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Supabase email/password authentication
  - path: /pending
    file: src/app/pending/page.tsx
    auth_required: true
    description: Pending validation report for incomplete products
  - path: /families
    file: src/app/families/page.tsx
    auth_required: true
    description: Family management with mass editor
  - path: /families/new
    file: src/app/families/new/page.tsx
    auth_required: true
    description: Create new family form
  - path: /products
    file: src/app/products/page.tsx
    auth_required: true
    description: Product catalog listing (redirects to /)
  - path: /products/new
    file: src/app/products/new/page.tsx
    auth_required: true
    description: Create new product with SKU parsing and naming rules
  - path: /products/[id]
    file: src/app/products/[id]/page.tsx
    auth_required: true
    description: View and edit product by ID
  - path: /products/mass-import
    file: src/app/products/mass-import/page.tsx
    auth_required: true
    description: CSV/Excel mass product import
  - path: /templates
    file: src/app/templates/page.tsx
    auth_required: true
    description: Template dashboard with CRUD actions
  - path: /templates/builder
    file: src/app/templates/builder/page.tsx
    auth_required: true
    description: Visual drag-and-drop template builder
  - path: /generate
    file: src/app/generate/page.tsx
    auth_required: true
    description: Document generation - filter products, select template, bulk export
  - path: /generate/[id]
    file: src/app/generate/[id]/page.tsx
    auth_required: true
    description: Single product preview with interactive template rendering
  - path: /export-render
    file: src/app/export-render/page.tsx
    auth_required: false
    description: Minimal headless render page for Puppeteer capture
  - path: /datasets
    file: src/app/datasets/page.tsx
    auth_required: true
    description: External dataset management - import CSV/Excel custom data sources
  - path: /assets
    file: src/app/assets/page.tsx
    auth_required: true
    description: Centralized multimedia asset library with smart isometric features
  - path: /configuration
    file: src/app/configuration/page.tsx
    auth_required: true
    description: Configuration hub with rules table, nomenclatures, mass import settings
  - path: /configuration/families
    file: src/app/configuration/families/page.tsx
    auth_required: true
    description: Family management (config alias)
  - path: /configuration/reference-editor
    file: src/app/configuration/reference-editor/page.tsx
    auth_required: true
    description: Mass editor for product reference attributes
  - path: /configuration/version-editor
    file: src/app/configuration/version-editor/page.tsx
    auth_required: true
    description: Mass editor for product version attributes
  - path: /configuration/sku-editor
    file: src/app/configuration/sku-editor/page.tsx
    auth_required: true
    description: Mass editor for SKU attributes and barcodes
  - path: /configuration/glossary
    file: src/app/configuration/glossary/page.tsx
    auth_required: true
    description: Bilingual glossary editor for translation engine
  - path: /configuration/versions
    file: src/app/configuration/versions/page.tsx
    auth_required: true
    description: Global version rules (MRH/GVR) management
  - path: /configuration/colors
    file: src/app/configuration/colors/page.tsx
    auth_required: true
    description: SAP color code CRUD manager
  - path: /configuration/clients
    file: src/app/configuration/clients/page.tsx
    auth_required: true
    description: Private label client management
features:
  - name: Dashboard
    description: Central landing page showing system KPIs and quick access modules
    files:
      - src/app/page.tsx
      - src/lib/engine/validationActions.ts
    entry_route: /
    user_interactions:
      - View KPI cards (total products, pending count, active templates, generated docs)
      - Click quick-link cards to navigate to modules
      - View recent product activity table
    api_calls:
      - method: GET
        endpoint: /api/revalidate
    auth_required: true
  - name: Login
    description: Supabase email/password authentication
    files:
      - src/app/login/page.tsx
      - src/proxy.ts
      - src/utils/supabase/middleware.ts
    entry_route: /login
    user_interactions:
      - Enter email in input field
      - Enter password in input field
      - Click Iniciar Sesion button
      - See error message on invalid credentials
      - Redirect to dashboard on success
    api_calls: []
    auth_required: false
  - name: Product Creation
    description: Create new products with automatic SKU parsing, naming rules, and bilingual translation
    files:
      - src/app/products/new/page.tsx
      - src/app/products/ProductForm.tsx
      - src/app/products/actions.ts
      - src/lib/engine/codeParser.ts
      - src/lib/engine/ruleEvaluator.ts
      - src/lib/engine/translator.ts
    entry_route: /products/new
    user_interactions:
      - Enter SKU code (auto-parses into components)
      - Select family, reference, version, color from parsed values
      - Fill optional product attributes
      - View auto-generated Spanish product name
      - Translate to English
      - Click save to persist product
    api_calls:
      - method: POST
        endpoint: createProductAction
      - method: POST
        endpoint: parseProductCodeAction
      - method: POST
        endpoint: translateAction
    auth_required: true
  - name: Template Builder
    description: Visual drag-and-drop designer for document templates with element binding
    files:
      - src/app/templates/builder/page.tsx
      - src/components/templates/TemplateCanvas.tsx
      - src/app/templates/actions.ts
    entry_route: /templates/builder
    user_interactions:
      - Create new template with name, dimensions, orientation
      - Drag-and-drop elements onto canvas
      - Resize and position elements
      - Configure element properties (data field, font, size, color)
      - Set template dimensions in mm
      - Bind elements to dataset schema variables
    api_calls:
      - method: POST
        endpoint: createTemplateAction
      - method: POST
        endpoint: updateTemplateAction
      - method: POST
        endpoint: duplicateTemplateAction
      - method: POST
        endpoint: deleteTemplateAction
    auth_required: true
  - name: Document Generation and Export
    description: Filter products, bind templates, preview and bulk export documents as PDF/PNG/JPG via Puppeteer
    files:
      - src/app/generate/page.tsx
      - src/app/generate/[id]/page.tsx
      - src/components/generate/GenerateClient.tsx
      - src/components/generate/BulkExportPanel.tsx
      - src/app/api/export/route.ts
      - src/lib/export/exportUtils.ts
      - src/lib/export/launchBrowser.ts
    entry_route: /generate
    user_interactions:
      - Select family filter from dropdown
      - Select reference filter
      - Type search query for product name/color
      - Pick template from dropdown list
      - Preview individual product with live template
      - Select/unselect products with checkboxes
      - Click export button for bulk PDF/PNG/JPG generation
      - View progress bar during generation
      - Download ZIP with generated documents
    api_calls:
      - method: POST
        endpoint: /api/export
      - method: POST
        endpoint: getAllFilteredProductsAction
      - method: POST
        endpoint: resolveAssetsAction
    auth_required: true
  - name: Family Management
    description: Mass editor for family properties, JSONB schema attributes, and product lines
    files:
      - src/app/families/page.tsx
      - src/app/families/MassEditClient.tsx
      - src/app/families/actions.ts
    entry_route: /families
    user_interactions:
      - Search families by code, name, line, zone
      - Select multiple families via checkboxes
      - Apply mass updates to selected families
      - Add/remove JSONB schema attributes across families
      - Manage product lines per family
      - Delete families with cascade preview
    api_calls:
      - method: POST
        endpoint: searchFamilies
      - method: POST
        endpoint: previewMassUpdateFamilies
      - method: POST
        endpoint: executeMassUpdateFamilies
      - method: POST
        endpoint: previewAddAttrToFamilies
      - method: POST
        endpoint: executeAddAttrToFamilies
    auth_required: true
  - name: Reference Editor
    description: Mass editor for product reference attributes with JSONB atomic mutations
    files:
      - src/app/configuration/reference-editor/page.tsx
      - src/app/configuration/reference-editor/ReferenceEditorTabs.tsx
      - src/app/configuration/reference-editor/actions.ts
    entry_route: /configuration/reference-editor
    user_interactions:
      - Search references by family code
      - Select multiple references
      - Update normal columns and JSONB ref_attrs
      - Add/remove attribute keys
      - Configure attribute schemas per family
    api_calls:
      - method: POST
        endpoint: previewMassUpdateReferences
      - method: POST
        endpoint: executeMassUpdateReferences
    auth_required: true
  - name: Asset Library
    description: Centralized multimedia repository with upload, gallery, smart isometric association
    files:
      - src/app/assets/page.tsx
      - src/app/assets/actions.ts
      - src/components/assets/AssetsGallery.tsx
      - src/components/assets/UploadAssetButton.tsx
      - src/app/api/assets/upload/route.ts
    entry_route: /assets
    user_interactions:
      - Upload files with name and type classification
      - View gallery with categorized tabs (icons, logos, isometrics)
      - Search and filter assets
      - Edit asset metadata
      - Delete assets
      - View isometric groups by reference
      - Run smart association suggestions
      - Normalize isometric filenames
      - Detect and associate orphan products
    api_calls:
      - method: POST
        endpoint: /api/assets/upload
      - method: POST
        endpoint: /api/assets/orphans/parse
      - method: POST
        endpoint: /api/assets/orphans/export
    auth_required: true
  - name: External Datasets
    description: Import CSV/Excel custom data sources with schema configuration and template linking
    files:
      - src/app/datasets/page.tsx
      - src/app/datasets/actions.ts
      - src/components/datasets/DatasetsClient.tsx
    entry_route: /datasets
    user_interactions:
      - Upload CSV/Excel file
      - Configure column schema mapping
      - Preview imported data rows
      - Link dataset to template via wizard
    api_calls:
      - method: POST
        endpoint: getDatasetsAction
    auth_required: true
  - name: Configuration Hub
    description: Central rules management and system configuration
    files:
      - src/app/configuration/page.tsx
      - src/components/rules/RulesTable.tsx
      - src/components/rules/RuleFormDialog.tsx
    entry_route: /configuration
    user_interactions:
      - View all system rules sorted by type/priority
      - Create new naming rule
      - Edit existing rule
      - Delete rule
      - Toggle mass import safety settings
      - Navigate to specialized editors
    api_calls:
      - method: POST
        endpoint: createRule
      - method: POST
        endpoint: updateRule
      - method: POST
        endpoint: deleteRule
    auth_required: true
  - name: Pending Validation Report
    description: Validation engine detecting products with incomplete data before export
    files:
      - src/app/pending/page.tsx
      - src/lib/engine/validationActions.ts
    entry_route: /pending
    user_interactions:
      - View table of products with pending issues
      - See severity badges (critical/warning)
      - Click product links to navigate to edit
      - View reason codes for each issue
    api_calls:
      - method: GET
        endpoint: getPendingSummaryCached
    auth_required: true
  - name: Mass Product Import
    description: Bulk import products from CSV/Excel with preview, diff, and safe execution
    files:
      - src/app/products/mass-import/page.tsx
      - src/app/products/mass-import/MassImportClient.tsx
      - src/app/api/mass-import/preview/route.ts
      - src/app/api/mass-import/execute/route.ts
      - src/lib/massImport/io.ts
    entry_route: /products/mass-import
    user_interactions:
      - Upload base Excel file
      - Download filled template
      - Preview import changes with diff display
      - Confirm execution
      - View import results
    api_calls:
      - method: POST
        endpoint: /api/mass-import/preview
      - method: POST
        endpoint: /api/mass-import/execute
      - method: POST
        endpoint: /api/mass-import/template
    auth_required: true
  - name: Glossary Manager
    description: Bilingual dictionary (Spanish/English) for the translation engine
    files:
      - src/app/configuration/glossary/page.tsx
      - src/app/configuration/glossary/GlossaryClient.tsx
      - src/app/configuration/glossary/actions.ts
    entry_route: /configuration/glossary
    user_interactions:
      - View list of glossary terms
      - Add new term with Spanish and English translation
      - Set term category and priority
      - Edit existing term
      - Delete term
      - Toggle active flag
    api_calls: []
    auth_required: true
  - name: Color Manager
    description: CRUD for SAP color codes used in product catalog
    files:
      - src/app/configuration/colors/page.tsx
      - src/app/configuration/colors/ColorsClient.tsx
      - src/app/configuration/colors/actions.ts
    entry_route: /configuration/colors
    user_interactions:
      - View color code list
      - Add new color (4-digit code + SAP name)
      - Edit existing color
      - Delete color
    api_calls:
      - method: POST
        endpoint: upsertColorAction
      - method: POST
        endpoint: deleteColorAction
    auth_required: true
  - name: Client Management
    description: Private label client management with logo association
    files:
      - src/app/configuration/clients/page.tsx
      - src/app/configuration/clients/ClientsClient.tsx
      - src/app/configuration/clients/actions.ts
    entry_route: /configuration/clients
    user_interactions:
      - View client list
      - Add new client with logo
      - Edit client details
      - Detect missing clients from product catalog
    api_calls: []
    auth_required: true
known_limitations:
  - issue: AiAssistantPanel component is not implemented (placeholder TODO)
    location: src/app/products/[id]/EditProductForm.tsx:305
    impact: AI assistant panel in product editing is non-functional
  - issue: Dashboard KPI for generated docs is hardcoded to 48
    location: src/app/page.tsx:40
    impact: Number does not reflect actual generated document count
  - issue: System asset names array is hardcoded in generate actions
    location: src/app/generate/actions.ts:10-18
    impact: Asset names cannot be configured without code changes
  - issue: Default client names hardcoded as fallback
    location: src/app/products/actions.ts:761
    impact: Clients list has static fallback values
  - issue: dbQuery uses custom string interpolation instead of parameterized queries
    location: src/lib/supabase.ts:29-58
    impact: Potential SQL injection risk (low, as queries use trusted inputs)
  - issue: Products listing page immediately redirects to dashboard
    location: src/app/products/page.tsx:24
    impact: Product catalog page is unreachable
  - issue: Prisma targets SQLite but production uses Supabase PostgreSQL
    location: prisma/schema.prisma
    impact: Prisma is used only for type generation, not actual ORM operations
  - issue: Native confirm() dialog used instead of custom UI component
    location: src/components/assets/EditAssetDialog.tsx:148
    impact: Inconsistent user experience
  - issue: Exceptions page simply redirects to /pending
    location: src/app/exceptions/page.tsx
    impact: Dead route with no functionality
